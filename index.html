<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e1e1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wochenplaner">

<title>Wochenplaner 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --bg2: #eee9e0;
    --ink: #1e1e1e;
    --ink2: #5a5550;
    --ink3: #9a9490;
    --card: #ffffff;
    --ms-bg: #e8f5e9; --ms-b: #43a047; --ms-t: #1b5e20;
    --kl-bg: #fff8e1; --kl-b: #ffb300; --kl-t: #e65100;
    --fk-bg: #e3f2fd; --fk-b: #1e88e5; --fk-t: #0d47a1;
    --se-bg: #fce4ec; --se-b: #e91e63; --se-t: #880e4f;
    --eg-bg: #f3e5f5; --eg-b: #8e24aa; --eg-t: #4a148c;
    --rz-bg: #e8eaf6; --rz-b: #3949ab; --rz-t: #1a237e;
    --accent: #c8512a;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  /* Header */
  .header {
    background: var(--ink);
    color: #f7f3ee;
    padding: 20px 20px 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 22px; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: #9a9490; font-family: 'DM Sans', monospace; }
  .steps { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .step-pill {
    padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.1); color: #777; cursor: default; transition: all 0.2s;
  }
  .step-pill.active { background: #c8512a; color: #fff; }
  .step-pill.clickable { cursor: pointer; }
  .step-pill.clickable:hover { background: rgba(255,255,255,0.2); color: #ccc; }

  /* Main */
  .main { max-width: 640px; margin: 0 auto; padding: 20px 16px; }

  /* Import Banner */
  .import-banner {
    background: var(--rz-bg); border: 1.5px solid var(--rz-b);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .import-banner-title { font-weight: 600; color: var(--rz-t); font-size: 13px; }
  .import-banner-sub { font-size: 11px; color: var(--rz-b); margin-top: 2px; }
  .badge { background: var(--rz-b); color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 10px; margin-left: 6px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 20px; border-radius: 24px; border: none;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .btn-dark { background: var(--ink); color: #f7f3ee; }
  .btn-dark:hover { background: #333; }
  .btn-dark:disabled { background: #ccc; color: #999; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: #f7f3ee; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #b0451e; }
  .btn-blue { background: var(--rz-t); color: #fff; }
  .btn-blue:hover { background: #283593; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-block { width: 100%; border-radius: var(--radius); padding: 15px; font-size: 15px; }

  /* Day Cards */
  .day-list { display: flex; flex-direction: column; gap: 8px; }
  .day-card {
    border-radius: var(--radius); border: 1.5px solid #e0dcd5;
    background: var(--card); overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .day-card-inner { display: flex; align-items: center; gap: 10px; padding: 13px 14px; }
  .day-name { width: 82px; font-weight: 600; font-size: 14px; flex-shrink: 0; }
  .day-recipe { flex: 1; display: flex; align-items: center; gap: 8px; }
  .day-recipe-emoji { font-size: 20px; flex-shrink: 0; }
  .day-recipe-name { font-weight: 600; font-size: 14px; }
  .day-recipe-tag { font-size: 10px; opacity: 0.65; margin-top: 1px; }
  .day-empty { flex: 1; font-size: 13px; color: var(--ink3); font-style: italic; }
  .day-actions { display: flex; gap: 5px; flex-shrink: 0; }

  /* Progress */
  .progress-box { background: var(--ink); color: #f7f3ee; border-radius: var(--radius); padding: 18px; margin-top: 20px; }
  .progress-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
  .progress-bar-bg { height: 5px; background: #444; border-radius: 3px; margin-bottom: 16px; }
  .progress-bar-fill { height: 5px; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

  /* Modal Overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 200; overflow-y: auto; padding: 20px 16px;
    display: flex; align-items: flex-start; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 20px; overflow: hidden;
    width: 100%; max-width: 460px; margin: auto;
  }
  .modal-header {
    background: var(--ink); color: #f7f3ee;
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h3 { font-size: 15px; }
  .modal-close { background: none; border: none; color: #f7f3ee; font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-body { padding: 16px; max-height: 70vh; overflow-y: auto; }

  /* Recipe Pool in Modal */
  .custom-input-row { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #f0ece6; }
  .custom-input {
    flex: 1; padding: 9px 14px; border-radius: 24px;
    border: 1.5px solid #e0dcd5; font-size: 13px;
    font-family: 'DM Sans', sans-serif; outline: none;
    background: var(--bg);
  }
  .custom-input:focus { border-color: var(--ink); }
  .tag-section { margin-bottom: 14px; }
  .tag-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; padding: 0 4px; margin-bottom: 6px;
  }
  .recipe-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px; border: 1.5px solid;
    background: transparent; cursor: pointer; text-align: left;
    width: 100%; margin-bottom: 5px; transition: opacity 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .recipe-btn:hover { opacity: 0.8; }
  .recipe-btn-name { font-size: 13px; font-weight: 600; }
  .recipe-btn-count { font-size: 10px; opacity: 0.6; margin-top: 1px; }

  /* Import Modal */
  .import-step { background: var(--rz-bg); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .import-step-title { font-weight: 600; color: var(--rz-t); font-size: 12px; margin-bottom: 6px; }
  .import-step-text { font-size: 12px; color: #444; line-height: 1.6; }
  .json-textarea {
    width: 100%; height: 170px; padding: 12px;
    border-radius: 10px; border: 1.5px solid #c5cae9;
    font-size: 11px; font-family: monospace;
    outline: none; resize: vertical; background: #fafbff;
  }
  .json-textarea:focus { border-color: var(--rz-b); }
  .error-msg { color: #c62828; font-size: 12px; margin-top: 6px; }
  .success-msg { color: #2e7d32; font-size: 12px; margin-top: 6px; }
  .example-toggle { background: none; border: none; color: var(--rz-b); font-size: 11px; cursor: pointer; text-decoration: underline; margin-bottom: 10px; padding: 0; }
  .example-pre {
    background: #f0f0f0; padding: 10px; border-radius: 8px;
    font-size: 10px; font-family: monospace; overflow-x: auto;
    margin-bottom: 10px; white-space: pre-wrap; color: #333;
  }

  /* Ingredient Step */
  .hint { color: var(--ink3); font-size: 13px; margin-bottom: 18px; }
  .ing-group { margin-bottom: 18px; border-radius: var(--radius); border: 1.5px solid; overflow: hidden; }
  .ing-group-header { padding: 12px 14px; display: flex; align-items: center; gap: 8px; }
  .ing-group-name { font-weight: 700; font-size: 14px; }
  .ing-group-day { font-size: 10px; opacity: 0.65; margin-top: 1px; }
  .ing-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; border-bottom: 1px solid #f5f5f5;
    cursor: pointer; background: #fff;
  }
  .ing-row:last-child { border-bottom: none; }
  .ing-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
  .ing-name { flex: 1; font-size: 13px; transition: color 0.15s; }
  .ing-name.crossed { color: #bbb; text-decoration: line-through; }
  .ing-amount { font-size: 12px; color: var(--ink3); }
  .ing-empty { padding: 12px 14px; font-size: 13px; color: var(--ink3); font-style: italic; }

  /* Bring & Alexa Step */
  .bring-hero { text-align: center; padding: 28px 0 20px; }
  .bring-hero-icon { font-size: 52px; margin-bottom: 10px; }
  .bring-hero h2 { font-size: 20px; margin-bottom: 6px; }
  .bring-hero p { color: var(--ink3); font-size: 13px; margin-bottom: 24px; }
  .bring-btn {
    display: block; padding: 15px 24px; border-radius: var(--radius);
    background: #ff5252; color: #fff; font-family: 'DM Sans', sans-serif;
    font-weight: 700; font-size: 15px; text-decoration: none;
    text-align: center; margin-bottom: 10px;
  }

  .alexa-box { background: #12122a; border-radius: var(--radius); padding: 18px; margin-bottom: 18px; }
  .alexa-box-title { display: flex; align-items: center; gap: 8px; color: #d0d0ff; font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .alexa-box-text { font-size: 12px; color: #8888bb; line-height: 1.6; margin-bottom: 14px; }
  .alexa-toggle {
    width: 100%; padding: 11px; border-radius: 10px;
    border: 1px solid #2a2a4e; background: #1e1e3a; color: #d0d0ff;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .alexa-pre {
    background: #080816; padding: 12px; border-radius: 10px;
    font-size: 10px; color: #50fa7b; overflow-x: auto;
    margin: 10px 0; line-height: 1.6; font-family: monospace; white-space: pre-wrap;
  }
  .alexa-copy {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer;
    transition: background 0.3s;
  }
  .alexa-copy.idle { background: #3a3aff; color: #fff; }
  .alexa-copy.done { background: #1b5e20; color: #fff; }

  .week-summary { background: var(--card); border-radius: var(--radius); border: 1.5px solid #e8e4de; overflow: hidden; margin-bottom: 18px; }
  .week-summary-header { padding: 13px 16px; background: var(--bg2); border-bottom: 1px solid #e8e4de; font-weight: 700; font-size: 14px; }
  .week-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f5f2ee; font-size: 13px; }
  .week-row:last-child { border-bottom: none; }
  .week-day { width: 88px; font-weight: 600; }
  .week-gericht { color: var(--ink2); }
  .week-empty { color: var(--ink3); font-style: italic; }

  /* Responsive */
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .day-name { width: 68px; font-size: 13px; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>

async function savePlanToSupabase(plan) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/wochenplan?id=eq.aktuell`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ plan: plan, updated_at: new Date().toISOString() })
    });
    return res.ok;
  } catch(e) {
    console.error('Supabase save error:', e);
    return false;
  }
}

async function savePoolToSupabase(pool) {
  // Delete all and re-insert (simple upsert)
  try {
    // First delete non-default recipes (custom/imported)
    const toSave = pool.filter(r => !r.id.startsWith('p')); // only custom/imported
    for (const recipe of toSave) {
      await fetch(`${SUPABASE_URL}/rest/v1/rezeptpool`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates'
        },
        body: JSON.stringify({
          id: recipe.id,
          name: recipe.name,
          emoji: recipe.emoji,
          tag: recipe.tag,
          ingredients: recipe.ingredients
        })
      });
    }
    return true;
  } catch(e) {
    console.error('Pool save error:', e);
    return false;
  }
}

async function loadPoolFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rezeptpool?select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      return data.map(r => ({
        id: r.id, name: r.name, emoji: r.emoji,
        tag: r.tag, ingredients: r.ingredients || []
      }));
    }
  } catch(e) {
    console.error('Pool load error:', e);
  }
  return [];
}

async function deleteFromPool(id) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/rezeptpool?id=eq.${id}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
  } catch(e) { console.error('Pool delete error:', e); }
}

async function loadPlanFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/wochenplan?id=eq.aktuell&select=plan`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    if (data?.[0]?.plan && Object.keys(data[0].plan).length > 0) {
      return data[0].plan;
    }
  } catch(e) {
    console.error('Supabase load error:', e);
  }
  return null;
}

// ─── STATE ───────────────────────────────────────────────
function loadState() {
  try {
    const saved = localStorage.getItem('wochenplaner_v2');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {
    weekPlan: {
      Montag:null, Dienstag:null,
      Mittwoch:{id:"ms1",name:"Röstkartoffeln mit Olivenpesto",emoji:"🥔",tag:"Marley Spoon",ingredients:[{name:"Mehligkochende Kartoffeln",amount:"2,5 Pck."},{name:"Rote Zwiebeln",amount:"2,5"},{name:"Cashewkerne",amount:"188g"},{name:"Knoblauchzehen",amount:"5"},{name:"Petersilie",amount:"25g"},{name:"Grüne Oliven",amount:"2,5 Pck."},{name:"Tomaten",amount:"5"},{name:"Rucola",amount:"250g"}]},
      Donnerstag:{id:"ms2",name:"Griechischer Hähnchenteller",emoji:"🫙",tag:"Marley Spoon",ingredients:[{name:"Rote Zwiebeln",amount:"2,5"},{name:"Knoblauchzehen",amount:"2,5"},{name:"Hähnchenbrustfilet",amount:"2,5 Stück"},{name:"Getrockneter Oregano",amount:"2,5 Pck."},{name:"Tomaten",amount:"5"},{name:"Gurken",amount:"2,5"},{name:"Feta",amount:"250g"},{name:"Schwarze Oliven",amount:"2,5 Pck."}]},
      Freitag:null,

    },

}

let S = loadState();

function saveState() {
  try { localStorage.setItem('wochenplaner_v2', JSON.stringify(S)); } catch(e) {}
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  saveState();
  updatePills();
  const main = document.getElementById('main');
  if (S.step === 'plan') main.innerHTML = renderPlan();
  else if (S.step === 'ingredients') main.innerHTML = renderIngredients();
  else if (S.step === 'bring') main.innerHTML = renderBring();
  attachEvents();
}

function updatePills() {
  ['plan','ingredients','bring'].forEach(s => {
    const el = document.getElementById('pill-'+s);
    if (!el) return;
    el.className = 'step-pill' + (S.step===s?' active':'') + (s==='plan'?' clickable':'');
  });
}

// ─── PLAN STEP ───────────────────────────────────────────
function renderPlan() {
  const importedCount = S.pool.filter(r=>r.tag==='Vom Rezept').length;
  const filled = DAYS.filter(d=>S.weekPlan[d]&&!S.noKookDays.includes(d)).length;
  const total = DAYS.filter(d=>!S.noKookDays.includes(d)).length;
  const pct = total>0 ? (filled/total*100) : 0;

  let days = DAYS.map(day => {
    const recipe = S.weekPlan[day];
    const isNoKook = S.noKookDays.includes(day);
    const isMS = recipe?.tag==='Marley Spoon';
    const ts = recipe ? (TAG_STYLES[recipe.tag]||TAG_STYLES['Eigenes Gericht']) : null;
    const borderColor = isNoKook ? '#e0dcd5' : (recipe ? ts.border : '#e0dcd5');
    const bgColor = isNoKook ? '#f9f7f4' : (recipe ? ts.bg : '#fff');

    let recipeHtml = '';
    if (isNoKook) {
      recipeHtml = `<span class="day-empty">Kein Kochen</span>`;
    } else if (recipe) {
      recipeHtml = `<div class="day-recipe">
        <span class="day-recipe-emoji">${recipe.emoji}</span>
        <div>
          <div class="day-recipe-name" style="color:${ts.text}">${recipe.name}</div>
          <div class="day-recipe-tag" style="color:${ts.text}">${recipe.tag}</div>
        </div>
      </div>`;
    } else {
      recipeHtml = `<span class="day-empty">Noch kein Gericht</span>`;
    }

    const changeBtn = (!isNoKook && !isMS) ? `<button class="btn btn-outline btn-sm" onclick="openPicker('${day}')">${recipe?'Ändern':'+ Wählen'}</button>` : '';
    const noKookBtn = `<button class="btn btn-sm" style="background:transparent;border:1.5px solid #e0dcd5;color:#999;padding:6px 10px;" onclick="toggleNoKook('${day}')">${isNoKook?'↩':'🚫'}</button>`;

    return `<div class="day-card" style="border-color:${borderColor};background:${bgColor}">
      <div class="day-card-inner">
        <div class="day-name">${day}</div>
        ${recipeHtml}
        <div class="day-actions">${changeBtn}${noKookBtn}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="import-banner">
      <div>
        <div class="import-banner-title">📸 Rezept aus Foto/PDF importieren</div>
        <div class="import-banner-sub">Schick mir das Bild im Chat → ich erstelle den JSON → hier einfügen${importedCount>0?`<span class="badge">${importedCount} importiert</span>`:''}</div>
      </div>
      <button class="btn btn-blue btn-sm" onclick="openImport()">+ Rezept einfügen</button>
    </div>

    <div class="day-list">${days}</div>

    <div class="progress-box">
      <div class="progress-top">
        <span>${filled} von ${total} Kochtagen geplant</span>
        <span style="color:#777">${total-filled} offen</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <button class="btn btn-accent btn-block" onclick="goToIngredients()" ${filled===0?'disabled':''}>→ Weiter zu den Zutaten</button>
    </div>

    <!-- Picker Modal -->
    <div class="overlay" id="picker-overlay" style="display:none" onclick="closePicker(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3 id="picker-title">Gericht wählen</h3>
          <button class="modal-close" onclick="closePicker()">×</button>
        </div>
        <div class="custom-input-row">
          <input class="custom-input" id="custom-name" placeholder="Eigenes Gericht eingeben…" onkeydown="if(event.key==='Enter')addCustomRecipe()">
          <button class="btn btn-dark btn-sm" onclick="addCustomRecipe()">+</button>
        </div>
        <div class="modal-body" id="picker-body"></div>
      </div>
    </div>

    <!-- Import Modal -->
    <div class="overlay" id="import-overlay" style="display:none" onclick="closeImport(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header" style="background:#1a237e">
          <h3>📸 Rezept importieren</h3>
          <button class="modal-close" onclick="closeImport()">×</button>
        </div>
        <div style="padding:18px">
          <div class="import-step">
            <div class="import-step-title">Schritt 1 – Rezept hier im Chat hochladen</div>
            <div class="import-step-text">Schick mir das Foto oder PDF deines Rezepts in diesem Chat. Ich antworte mit einem fertigen JSON — angepasst auf 5 Personen.</div>
          </div>
          <div class="import-step">
            <div class="import-step-title">Schritt 2 – JSON hier einfügen</div>
            <textarea class="json-textarea" id="import-json" placeholder='{\n  "name": "Rezeptname",\n  "emoji": "🍽️",\n  "tag": "Familienküche",\n  "ingredients": [\n    { "name": "Zutat", "amount": "Menge" }\n  ]\n}'></textarea>
            <div id="import-error" class="error-msg" style="display:none"></div>
            <div id="import-success" class="success-msg" style="display:none"></div>
          </div>
          <button class="example-toggle" onclick="toggleExample()">Beispiel-JSON anzeigen</button>
          <pre class="example-pre" id="example-pre" style="display:none">${EXAMPLE_JSON}</pre>
          <div style="display:flex;gap:10px;margin-top:4px">
            <button class="btn btn-outline" style="flex:1" onclick="closeImport()">Abbrechen</button>
            <button class="btn btn-blue" style="flex:2" onclick="importRecipe()">✅ Zum Pool hinzufügen</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ─── INGREDIENTS STEP ────────────────────────────────────
function buildIngredientGroups() {
  const groups = {};
  DAYS.forEach(day => {
    const recipe = S.weekPlan[day];
    if (recipe && !S.noKookDays.includes(day)) {
      groups[day] = { recipe, ingredients: recipe.ingredients.map((ing,i) => ({...ing, id:`${day}-${i}`})) };
    }
  });
  return groups;
}

function renderIngredients() {
  const groups = buildIngredientGroups();
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="font-size:20px">Zutaten auswählen</h2>
      <button class="btn btn-outline btn-sm" onclick="goToStep('plan')">← Zurück</button>
    </div>
    <p class="hint">Hake ab was du bereits hast — der Rest kommt auf die Bring!-Liste.</p>
  `;

  if (Object.keys(groups).length === 0) {
    html += `<p class="hint" style="text-align:center;padding:40px 0">Keine Gerichte geplant.</p>`;
  } else {
    Object.entries(groups).forEach(([day, {recipe, ingredients}]) => {
      const ts = TAG_STYLES[recipe.tag] || TAG_STYLES['Eigenes Gericht'];
      let rows = ingredients.length === 0
        ? `<div class="ing-empty">Keine Zutaten hinterlegt</div>`
        : ingredients.map(ing => {
            const checked = S.selectedIngredients[ing.id] !== false;
            return `<label class="ing-row" onclick="toggleIng('${ing.id}')">
              <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleIng('${ing.id}')">
              <span class="ing-name ${checked?'':'crossed'}">${ing.name}</span>
              <span class="ing-amount">${ing.amount}</span>
            </label>`;
          }).join('');

      html += `<div class="ing-group" style="border-color:${ts.border}">
        <div class="ing-group-header" style="background:${ts.bg}">
          <span style="font-size:18px">${recipe.emoji}</span>
          <div>
            <div class="ing-group-name" style="color:${ts.text}">${recipe.name}</div>
            <div class="ing-group-day" style="color:${ts.text}">${day}</div>
          </div>
        </div>
        ${rows}
      </div>`;
    });
  }

  html += `<button class="btn btn-dark btn-block" onclick="goToBring()" style="margin-top:8px">🛒 Bring!-Liste erstellen</button>`;
  return html;
}

// ─── BRING STEP ──────────────────────────────────────────
function renderBring() {
  const alexaJson = buildAlexaJson();
  const alexaClass = S.alexaCopied ? 'done' : 'idle';
  const alexaLabel = S.alexaCopied ? '✅ Kopiert!' : '📋 JSON kopieren';

  let weekRows = DAYS.map(day => {
    const recipe = S.weekPlan[day];
    const isNoKook = S.noKookDays.includes(day);
    const content = isNoKook
      ? `<span class="week-empty">— kein Kochen</span>`
      : recipe
        ? `<span class="week-gericht">${recipe.emoji} ${recipe.name}</span>`
        : `<span class="week-empty">nicht geplant</span>`;
    return `<div class="week-row"><div class="week-day">${day}</div>${content}</div>`;
  }).join('');

  return `
    <div class="bring-hero">
      <div class="bring-hero-icon">🛒</div>
      <h2>Einkaufsliste bereit!</h2>
      <p>Alle ausgewählten Zutaten direkt in Bring! übernehmen.</p>
      <a class="bring-btn" href="${S.bringLink||'#'}" id="bring-link">In Bring! öffnen →</a>
      <button class="btn btn-outline btn-block" onclick="copyBring()" style="margin-bottom:10px">🔗 Link kopieren</button>
      <button class="btn btn-block" onclick="toggleAlexaList()" style="background:#1a6b3a;color:#fff;margin-bottom:0">🛒 Per Alexa hinzufügen</button>
    </div>

    <div id="alexa-list-box" style="display:none;background:#f0fff4;border:1.5px solid #43a047;border-radius:16px;padding:18px;margin-bottom:18px">
      <div style="font-weight:700;color:#1b5e20;font-size:15px;margin-bottom:6px">🎙️ Alexa-Einkaufsliste</div>
      <div style="font-size:12px;color:#2e7d32;margin-bottom:14px">Sag Alexa die untenstehenden Zutaten — oder lies sie einfach vor. Alexa trägt alles in Bring! ein.</div>
      <div id="alexa-list-content"></div>
      <button class="btn btn-block" onclick="copyAlexaList()" id="alexa-list-copy-btn" style="background:#1b5e20;color:#fff;margin-top:14px">📋 Alle als Text kopieren</button>
    </div>

    <div class="alexa-box">
      <div class="alexa-box-title"><span>🔵</span> Alexa – Wochenplan</div>
      ${S.alexaSyncStatus === 'syncing' ? `
        <div style="display:flex;align-items:center;gap:10px;color:#aab;font-size:13px;font-family:sans-serif">
          <span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Wird an Alexa gesendet…
        </div>
      ` : S.alexaSyncStatus === 'done' ? `
        <div style="color:#50fa7b;font-size:14px;font-weight:700">✅ Alexa kennt den neuen Wochenplan!</div>
        <div style="color:#8888bb;font-size:12px;margin-top:4px">Sag einfach: „Alexa, öffne Essensplaner"</div>
      ` : S.alexaSyncStatus === 'error' ? `
        <div style="color:#ff6b6b;font-size:13px">❌ Sync fehlgeschlagen. Bitte nochmal versuchen.</div>
        <button class="alexa-toggle" style="margin-top:10px" onclick="retrySyncAlexa()">↺ Nochmal versuchen</button>
      ` : `
        <div style="color:#aab;font-size:13px;font-family:sans-serif">Plan wird beim Erstellen der Einkaufsliste automatisch gesendet.</div>
      `}
    </div>

    <div class="week-summary">
      <div class="week-summary-header">📋 Wochenplan-Übersicht</div>
      ${weekRows}
    </div>

    <button class="btn btn-outline btn-block" onclick="resetWeek()">↺ Neue Woche planen</button>
  `;
}

// ─── ACTIONS ─────────────────────────────────────────────
function goToStep(step) { S.step = step; render(); }

function goToIngredients() {
  const groups = buildIngredientGroups();
  // Init all checked
  Object.values(groups).forEach(({ingredients}) =>
    ingredients.forEach(ing => { if (S.selectedIngredients[ing.id] === undefined) S.selectedIngredients[ing.id] = true; })
  );
  S.step = 'ingredients';
  render();
}

async function goToBring() {
  const groups = buildIngredientGroups();
  const items = [];
  Object.entries(groups).forEach(([day, {ingredients}]) => {
    ingredients.forEach(ing => {
      if (S.selectedIngredients[ing.id] !== false)
        items.push({name:`${ing.name} (${day})`, specification: ing.amount});
    });
  });
  S.bringLink = `https://api.getbring.com/rest/bringrecipes/deeplink?locale=de-DE&source=web&items=${encodeURIComponent(JSON.stringify(items))}`;
  
  // Wochenplan automatisch an Supabase (→ Alexa) senden
  const alexaPlan = {};
  DAYS.forEach(day => {
    const recipe = S.weekPlan[day];
    const isNoKook = S.noKookDays.includes(day);
    alexaPlan[day] = { gericht: isNoKook ? 'kein Kochen' : (recipe?.name || ''), tag: recipe?.tag || '' };
  });
  S.alexaSyncStatus = 'syncing';
  S.step = 'bring';
  render();
  const ok = await savePlanToSupabase(alexaPlan);
  S.alexaSyncStatus = ok ? 'done' : 'error';
  render();
}

function toggleNoKook(day) {
  if (S.noKookDays.includes(day)) {
    S.noKookDays = S.noKookDays.filter(d=>d!==day);
  } else {
    S.noKookDays.push(day);
    S.weekPlan[day] = null;
  }
  render();
}

function toggleIng(id) {
  S.selectedIngredients[id] = S.selectedIngredients[id] === false ? true : false;
  render();
}

let currentPickerDay = null;
function openPicker(day) {
  currentPickerDay = day;
  const overlay = document.getElementById('picker-overlay');
  document.getElementById('picker-title').textContent = `Gericht für ${day}`;
  overlay.style.display = 'flex';
  renderPickerBody();
}
function closePicker(e) {
  if (e && e.target !== document.getElementById('picker-overlay')) return;
  document.getElementById('picker-overlay').style.display = 'none';
  currentPickerDay = null;
}
function renderPickerBody() {
  const tags = ['Vom Rezept','Klassiker','Familienküche','Schnell & einfach','Eigenes Gericht'];
  let html = '';
  tags.forEach(tag => {
    const recipes = S.pool.filter(r=>r.tag===tag);
    if (!recipes.length) return;
    const ts = TAG_STYLES[tag]||TAG_STYLES['Eigenes Gericht'];
    html += `<div class="tag-section">
      <div class="tag-label" style="color:${ts.text}">${tag}</div>`;
    recipes.forEach(r => {
      html += `<button class="recipe-btn" style="border-color:${ts.border};background:${ts.bg}" onclick="assignRecipe('${r.id}')">
        <span style="font-size:18px">${r.emoji}</span>
        <div>
          <div class="recipe-btn-name" style="color:${ts.text}">${r.name}</div>
          ${r.ingredients?.length>0?`<div class="recipe-btn-count" style="color:${ts.text}">${r.ingredients.length} Zutaten</div>`:''}
        </div>
      </button>`;
    });
    html += `</div>`;
  });
  document.getElementById('picker-body').innerHTML = html || '<p style="color:#999;font-size:13px;padding:10px">Noch keine Rezepte. Oben eingeben!</p>';
}

function assignRecipe(id) {
  const recipe = S.pool.find(r=>r.id===id);
  if (recipe && currentPickerDay) {
    S.weekPlan[currentPickerDay] = recipe;
    document.getElementById('picker-overlay').style.display = 'none';
    currentPickerDay = null;
    render();
  }
}

function addCustomRecipe() {
  const input = document.getElementById('custom-name');
  const name = input?.value?.trim();
  if (!name) return;
  const recipe = {id:`custom-${Date.now()}`,name,emoji:'🍽️',tag:'Eigenes Gericht',ingredients:[]};
  S.pool.push(recipe);
  savePoolToSupabase(S.pool);
  if (currentPickerDay) {
    S.weekPlan[currentPickerDay] = recipe;
    document.getElementById('picker-overlay').style.display = 'none';
    currentPickerDay = null;
    render();
  } else {
    if(input) input.value = '';
    renderPickerBody();
  }
}

function openImport() { document.getElementById('import-overlay').style.display='flex'; }
function closeImport(e) {
  if (e && e.target !== document.getElementById('import-overlay')) return;
  document.getElementById('import-overlay').style.display='none';
}
function toggleExample() {
  const pre = document.getElementById('example-pre');
  const btn = document.querySelector('.example-toggle');
  if (pre.style.display==='none') { pre.style.display='block'; btn.textContent='Beispiel ausblenden'; }
  else { pre.style.display='none'; btn.textContent='Beispiel-JSON anzeigen'; }
}
function importRecipe() {
  const txt = document.getElementById('import-json')?.value?.trim();
  const errEl = document.getElementById('import-error');
  const okEl = document.getElementById('import-success');
  errEl.style.display='none'; okEl.style.display='none';
  try {
    const parsed = JSON.parse(txt);
    if (!parsed.name || !parsed.ingredients) throw new Error('Pflichtfelder fehlen');
    const recipe = {id:`import-${Date.now()}`,name:parsed.name,emoji:parsed.emoji||'🍽️',tag:parsed.tag||'Vom Rezept',ingredients:parsed.ingredients||[]};
    S.pool.push(recipe);
    saveState();
    savePoolToSupabase(S.pool);
    okEl.textContent = `✅ „${recipe.name}" wurde hinzugefügt!`;
    okEl.style.display='block';
    document.getElementById('import-json').value='';
    setTimeout(()=>{ document.getElementById('import-overlay').style.display='none'; render(); },1800);
  } catch(e) {
    errEl.textContent = '❌ Ungültiges JSON. Bitte prüfe das Format.';
    errEl.style.display='block';
  }
}

function buildAlexaJson() {
  const plan = {};
  DAYS.forEach(day => {
    const recipe = S.weekPlan[day];
    const isNoKook = S.noKookDays.includes(day);
    plan[day] = {gericht: isNoKook?'kein Kochen':(recipe?.name||''), tag: recipe?.tag||''};
  });
  return JSON.stringify(plan,null,2);
}

function toggleAlexaJson() { S.showAlexaJson=!S.showAlexaJson; render(); }

function copyAlexaJson() {
  navigator.clipboard?.writeText(buildAlexaJson());
  S.alexaCopied=true; render();
  setTimeout(()=>{ S.alexaCopied=false; render(); },3000);
}

function copyBring() { navigator.clipboard?.writeText(S.bringLink||''); }

function resetWeek() {
  S.weekPlan = {Montag:null,Dienstag:null,Mittwoch:null,Donnerstag:null,Freitag:null,Samstag:null,Sonntag:null};
  S.noKookDays = ["Freitag"];
  S.selectedIngredients = {};
  S.bringLink = '';
  S.showAlexaJson = false;
  S.step = 'plan';
  render();
}

function attachEvents() {
  // keyboard on custom input in modal if already open
}

async function retrySyncAlexa() {
  const alexaPlan = {};
  DAYS.forEach(day => {
    const recipe = S.weekPlan[day];
    const isNoKook = S.noKookDays.includes(day);
    alexaPlan[day] = { gericht: isNoKook ? 'kein Kochen' : (recipe?.name || ''), tag: recipe?.tag || '' };
  });
  S.alexaSyncStatus = 'syncing';
  render();
  const ok = await savePlanToSupabase(alexaPlan);
  S.alexaSyncStatus = ok ? 'done' : 'error';
  render();
}

function buildAlexaShoppingList() {
  const groups = buildIngredientGroups();
  let lines = [];
  Object.entries(groups).forEach(([day, {recipe, ingredients}]) => {
    const selected = ingredients.filter(ing => S.selectedIngredients[ing.id] !== false);
    if (selected.length === 0) return;
    lines.push(`── ${recipe.name} (${day}) ──`);
    selected.forEach(ing => lines.push(`• ${ing.name}: ${ing.amount}`));
    lines.push('');
  });
  return lines.join('\n');
}

function buildAlexaCommands() {
  const groups = buildIngredientGroups();
  let cmds = [];
  Object.entries(groups).forEach(([day, {recipe, ingredients}]) => {
    const selected = ingredients.filter(ing => S.selectedIngredients[ing.id] !== false);
    selected.forEach(ing => cmds.push(`Alexa, füge ${ing.name} zur Einkaufsliste hinzu.`));
  });
  return cmds;
}

function toggleAlexaList() {
  const box = document.getElementById('alexa-list-box');
  if (box.style.display === 'none') {
    box.style.display = 'block';
    renderAlexaList();
  } else {
    box.style.display = 'none';
  }
}

function renderAlexaList() {
  const groups = buildIngredientGroups();
  const content = document.getElementById('alexa-list-content');
  let html = '';
  Object.entries(groups).forEach(([day, {recipe, ingredients}]) => {
    const selected = ingredients.filter(ing => S.selectedIngredients[ing.id] !== false);
    if (selected.length === 0) return;
    const ts = TAG_STYLES[recipe.tag] || TAG_STYLES['Eigenes Gericht'];
    html += `<div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:13px;color:${ts.text};background:${ts.bg};padding:6px 10px;border-radius:8px;margin-bottom:6px">${recipe.emoji} ${recipe.name} · ${day}</div>`;
    selected.forEach(ing => {
      html += `<div style="padding:6px 10px;font-size:13px;border-bottom:1px solid #e8f5e9;display:flex;justify-content:space-between">
        <span>🎙️ <em>„Alexa, füge <strong>${ing.name}</strong> zur Einkaufsliste hinzu"</em></span>
        <span style="color:#666;font-size:11px;margin-left:8px">${ing.amount}</span>
      </div>`;
    });
    html += '</div>';
  });
  content.innerHTML = html || '<p style="color:#999;font-size:13px">Keine Zutaten ausgewählt.</p>';
}

function copyAlexaList() {
  const text = buildAlexaShoppingList();
  navigator.clipboard?.writeText(text);
  const btn = document.getElementById('alexa-list-copy-btn');
  if (btn) { btn.textContent = '✅ Kopiert!'; setTimeout(() => { btn.textContent = '📋 Alle als Text kopieren'; }, 2500); }
}

// ─── INIT ────────────────────────────────────────────────
async function init() {
  // Load custom/imported recipes from Supabase and merge with defaults
  const cloudPool = await loadPoolFromSupabase();
  if (cloudPool.length > 0) {
    // Merge: keep defaults, add cloud recipes that aren't already there
    const existingIds = S.pool.map(r => r.id);
    cloudPool.forEach(r => {
      if (!existingIds.includes(r.id)) S.pool.push(r);
    });
  }
  render();
}
init();
</script>
